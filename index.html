<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hang Tag — Mythic 240SC</title>
  <link rel="stylesheet" href="hangtag.css">
</head>
<body>

<div class="hangtag">

  <!-- ══ ZONE 1: TOP DARK BLOCK ══ -->
  <div class="top-zone">

    <div class="hole-area"></div>

    <div class="logo-wrap">
      <img src="Basf.svg" alt="BASF" class="basf-logo">
    </div>

    <div class="product-name-block">
      <div class="product-title-row">
        <span class="product-mythic">Mythic® 240SC</span>
      </div>
      <div class="product-tagline">Thuốc diệt mối lan truyền</div>
    </div>

  </div>

  <div class="top-zone-tail"></div>

  <!-- ══ ZONE 2: 4 PHOTO CIRCLES ══ -->
  <div class="photos-zone">
    <div class="photo-circle">
      <img src="termite.jpeg" alt="Mối 1">
    </div>
    <div class="photo-circle">
      <img src="termite2.jpeg" alt="Mối 2">
    </div>
    <div class="photo-circle">
      <img src="termite.jpg" alt="Mối 3">
    </div>
    <div class="photo-circle">
      <img src="termite2.jpg" alt="Mối 4">
    </div>
  </div>

  <!-- ══ ZONE 3: LẮC ĐỀU ══ -->
  <div class="shake-zone">

    <div class="shake-deco-row">
      <i></i>
      <!-- bottle / shake icon -->
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 2h6v1.5H7V2zm-1 2.5h8l.7 2.5H5.3L6 4.5zM5 8h10l.8 7.5A1.5 1.5 0 0114.3 17H5.7a1.5 1.5 0 01-1.5-1.5L5 8z"
              fill="#E87520"/>
        <path d="M9 12v3M11 11v4" stroke="#FFB000" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <i></i>
    </div>

    <div class="lac-deu">LẮC KỸ</div>
    <div class="lac-sub-vi">Trước khi mở nắp</div>
    <div class="shake-bar"></div>
    <div class="shake-en">Shake before opening</div>

  </div>

  <!-- ══ ZONE 4: DOSAGE ══ -->
  <div class="dosage-zone">

    <div class="dosage-title">Hướng dẫn sử dụng</div>

    <!-- Liều pha -->
    <div class="d-row">
      <div class="d-icon-circle">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 3C10 3 5 8.5 5 12a5 5 0 0010 0C15 8.5 10 3 10 3z" fill="#fff"/>
        </svg>
      </div>
      <div class="d-text">
        <span class="d-key">Liều pha</span>
        <span class="d-val">8–16 ml / 1 lít nước</span>
      </div>
    </div>

    <!-- Tẩm nền -->
    <div class="d-row">
      <div class="d-icon-circle">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="6" height="6" rx="1" fill="#fff" fill-opacity=".9"/>
          <rect x="12" y="2" width="6" height="6" rx="1" fill="#fff" fill-opacity=".9"/>
          <rect x="2" y="12" width="6" height="6" rx="1" fill="#fff" fill-opacity=".9"/>
          <rect x="12" y="12" width="6" height="6" rx="1" fill="#fff" fill-opacity=".9"/>
        </svg>
      </div>
      <div class="d-text">
        <span class="d-key">Tẩm nền</span>
        <span class="d-val">5 lít / m²</span>
      </div>
    </div>

  </div>

  <!-- ══ ZONE 5: NOTE ══ -->
  <div class="note-zone">
    <span class="note-text"><span class="note-num">10</span>&nbsp;năm chống mối</span>
  </div>

  <!-- ══ ZONE 6: FOOTER + QR ══ -->
  <div class="footer-zone">
    <div class="qr-placeholder">
      <div class="qr-box">
        <span class="qr-label">QR</span>
      </div>
    </div>
    <div class="footer-brand-row">
      <span class="footer-mythic">Mythic® 240SC</span>
      <div class="footer-sep"></div>
      <img src="Basf.svg" alt="BASF" class="basf-logo">
    </div>
  </div>

</div>

</body>
</html>
