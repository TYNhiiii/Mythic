<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mythic 240SC Hangtag</title>
  <link rel="stylesheet" href="hangtag.css">
</head>
<body>
  <div class="hangtag">
    <div class="top-zone">
      <div class="hole-area"></div>
      <div class="logo-wrap">
        <img src="Basf.svg" alt="BASF" class="basf-logo">
      </div>
      <div class="product-name-block">
        <span class="product-mythic">Mythic® 240SC</span>
        <div class="product-tagline">Thuốc diệt mối lan truyền</div>
      </div>
    </div>
    <div class="top-zone-tail"></div>

    <div class="photos-zone">
      <div class="photo-circle"><img src="termite.jpeg"></div>
      <div class="photo-circle"><img src="termite2.jpeg"></div>
      <div class="photo-circle"><img src="termite.jpg"></div>
      <div class="photo-circle"><img src="termite2.jpg"></div>
    </div>

    <div class="shake-zone">
      <div class="shake-deco-row"><i></i><svg viewBox="0 0 20 20" fill="none"><path d="M7 2h6v1.5H7V2zm-1 2.5h8l.7 2.5H5.3L6 4.5zM5 8h10l.8 7.5A1.5 1.5 0 0114.3 17H5.7a1.5 1.5 0 01-1.5-1.5L5 8z" fill="#E87520"/></svg><i></i></div>
      <div class="lac-deu">LẮC KỸ</div>
      <div class="lac-sub-vi">Trước khi mở nắp</div>
      <div class="shake-bar"></div>
      <div class="shake-en">Shake before opening</div>
    </div>

    <div class="dosage-zone">
      <div class="dosage-title">Hướng dẫn sử dụng</div>
      <div class="d-row">
        <div class="d-icon-circle"><svg viewBox="0 0 20 20" fill="#fff"><path d="M10 3C10 3 5 8.5 5 12a5 5 0 0010 0C15 8.5 10 3 10 3z"/></svg></div>
        <div class="d-text-inline"><span class="d-key">Liều pha:</span><span class="d-val">8–16 ml / 1 lít nước</span></div>
      </div>
      <div class="d-row">
        <div class="d-icon-circle"><svg viewBox="0 0 20 20" fill="#fff"><rect x="2" y="2" width="6" height="6" rx="1"/><rect x="12" y="2" width="6" height="6" rx="1"/><rect x="2" y="12" width="6" height="6" rx="1"/><rect x="12" y="12" width="6" height="6" rx="1"/></svg></div>
        <div class="d-text-inline"><span class="d-key">Tẩm nền:</span><span class="d-val">5 lít / m²</span></div>
      </div>
    </div>

    <div class="note-zone"><span class="note-text"><span class="note-num">10</span> năm chống mối</span></div>

    <div class="footer-zone">
      <div class="qr-box"><span class="qr-label">QR</span></div>
      <div class="footer-brand-row">
        <span class="footer-mythic-new">Mythic® 240SC</span>
        <div class="footer-sep"></div>
        <img src="Basf.svg" class="footer-logo-basf">
      </div>
    </div>
  </div>
</body>
</html>
